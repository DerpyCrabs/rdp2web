<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rdp2web</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111416;
        --panel: #1c2227;
        --panel-2: #252d33;
        --text: #eef2f3;
        --muted: #a8b3b8;
        --accent: #3fb58f;
        --danger: #d96c6c;
        --border: #354047;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
        user-select: none;
      }

      .shell {
        display: block;
        min-height: 100vh;
      }

      header {
        align-items: center;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 12px;
        left: 0;
        min-height: 48px;
        padding: 8px 12px;
        position: fixed;
        right: 0;
        top: 0;
        z-index: 10;
      }

      .shell.connected header {
        opacity: 0.18;
        transform: translateY(calc(-100% + 6px));
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .shell.connected header:hover,
      .shell.connected header:focus-within {
        opacity: 1;
        transform: translateY(0);
      }

      .shell.has-error header {
        opacity: 1;
        transform: translateY(0);
      }

      main {
        height: 100vh;
      }

      .brand {
        font-weight: 650;
        margin-right: auto;
      }

      .metrics {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        min-width: 64px;
        text-align: right;
        white-space: nowrap;
      }

      .metrics.active {
        color: var(--text);
      }

      .status {
        color: var(--muted);
        min-width: 120px;
        overflow: hidden;
        text-align: right;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status.connected {
        color: var(--accent);
      }

      .status.error {
        color: var(--danger);
      }

      .size-controls {
        align-items: center;
        display: inline-flex;
        gap: 6px;
        flex: 0 0 auto;
      }

      .size-controls[hidden] {
        display: none;
      }

      select {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        height: 32px;
        min-width: 118px;
        padding: 0 8px;
      }

      select:disabled {
        color: var(--muted);
      }

      .icon-button {
        align-items: center;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        height: 32px;
        justify-content: center;
        padding: 0;
        width: 32px;
      }

      .icon-button:disabled {
        color: var(--muted);
        cursor: default;
      }

      .icon-button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .fullscreen-icon {
        background:
          linear-gradient(currentColor, currentColor) left top / 7px 2px no-repeat,
          linear-gradient(currentColor, currentColor) left top / 2px 7px no-repeat,
          linear-gradient(currentColor, currentColor) right top / 7px 2px no-repeat,
          linear-gradient(currentColor, currentColor) right top / 2px 7px no-repeat,
          linear-gradient(currentColor, currentColor) left bottom / 7px 2px no-repeat,
          linear-gradient(currentColor, currentColor) left bottom / 2px 7px no-repeat,
          linear-gradient(currentColor, currentColor) right bottom / 7px 2px no-repeat,
          linear-gradient(currentColor, currentColor) right bottom / 2px 7px no-repeat;
        display: block;
        height: 16px;
        width: 16px;
      }

      .stage {
        align-items: center;
        display: flex;
        height: 100%;
        justify-content: center;
        overflow: hidden;
        width: 100%;
      }

      canvas {
        background: #050607;
        box-shadow: 0 0 0 1px var(--border);
        cursor: default;
        display: block;
        height: auto;
        image-rendering: auto;
        max-height: 100%;
        max-width: 100%;
        outline: none;
        touch-action: none;
        width: auto;
      }

      .empty {
        color: var(--muted);
        left: 50%;
        position: absolute;
        text-align: center;
        top: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="brand">rdp2web</div>
        <div id="fps" class="metrics">0 fps</div>
        <div id="status" class="status">Disconnected</div>
        <div id="resolution" class="size-controls" hidden>
          <select id="resolutionPreset" aria-label="Resolution">
            <option value="auto">Auto</option>
            <option value="1280x720">1280x720</option>
            <option value="1366x768">1366x768</option>
            <option value="1600x900">1600x900</option>
            <option value="1920x1080">1920x1080</option>
            <option value="2560x1440">2560x1440</option>
          </select>
          <button id="fullscreenToggle" class="icon-button" type="button" aria-label="Enter fullscreen" title="Fullscreen">
            <span class="fullscreen-icon" aria-hidden="true"></span>
          </button>
        </div>
      </header>
      <main>
        <div class="stage">
          <canvas id="screen" tabindex="0"></canvas>
        </div>
        <div id="empty" class="empty">Connecting</div>
      </main>
    </div>

    <script>
      const shellEl = document.querySelector(".shell");
      const canvas = document.getElementById("screen");
      const stageEl = document.querySelector(".stage");
      const ctx = canvas.getContext("2d", { alpha: false });
      ctx.imageSmoothingEnabled = false;
      const statusEl = document.getElementById("status");
      const fpsEl = document.getElementById("fps");
      const emptyEl = document.getElementById("empty");
      const resolutionEl = document.getElementById("resolution");
      const resolutionPreset = document.getElementById("resolutionPreset");
      const fullscreenToggle = document.getElementById("fullscreenToggle");

      let socket = null;
      let rdpReady = false;
      let retryTimer = null;
      let codec = "";
      let decoder = null;
      let pendingFrame = null;
      let pendingDraw = false;
      let fpsFrames = 0;
      let fpsStartedAt = 0;
      let fpsLastFrameAt = 0;
      let autoResizeTimer = null;
      let defaultSize = { width: 1280, height: 720 };

      function setStatus(text, kind = "") {
        statusEl.textContent = text;
        statusEl.className = `status ${kind}`.trim();
        shellEl.classList.toggle("has-error", kind === "error");
      }

      function syncSizeControlState() {
        const enabled = !resolutionEl.hidden;
        resolutionPreset.disabled = !enabled;
        fullscreenToggle.disabled = !enabled || !document.fullscreenEnabled;
      }

      function setSizeControlsVisible(value) {
        resolutionEl.hidden = !value;
        syncSizeControlState();
      }

      function resetFps() {
        fpsFrames = 0;
        fpsLastFrameAt = 0;
        fpsStartedAt = performance.now();
        fpsEl.textContent = "0 fps";
        fpsEl.className = "metrics";
      }

      function recordFrameDrawn() {
        const now = performance.now();
        if (!fpsStartedAt) fpsStartedAt = now;
        fpsFrames += 1;
        fpsLastFrameAt = now;
      }

      function renderFps() {
        const now = performance.now();
        if (!fpsStartedAt) fpsStartedAt = now;
        const elapsedSeconds = Math.max((now - fpsStartedAt) / 1000, 0.001);
        const fps = fpsFrames / elapsedSeconds;
        const stale = !fpsLastFrameAt || now - fpsLastFrameAt > 1500;
        const visibleFps = stale ? 0 : fps;
        fpsEl.textContent = `${visibleFps.toFixed(visibleFps < 10 ? 1 : 0)} fps`;
        fpsEl.className = visibleFps > 0 ? "metrics active" : "metrics";
        fpsFrames = 0;
        fpsStartedAt = now;
      }

      function setReady(value) {
        rdpReady = value;
        shellEl.classList.toggle("connected", value);
        if (value && resolutionPreset.value === "auto") {
          scheduleAutoResize(0);
        }
      }

      function send(payload) {
        if (!rdpReady || !socket || socket.readyState !== WebSocket.OPEN) return;
        socket.send(JSON.stringify(payload));
      }

      function closeFrame(frame) {
        if (frame && typeof frame.close === "function") frame.close();
      }

      function closeDecoder() {
        if (decoder) {
          try {
            decoder.close();
          } catch {
          }
        }
        decoder = null;
        codec = "";
        if (pendingFrame) {
          closeFrame(pendingFrame);
          pendingFrame = null;
        }
        pendingDraw = false;
      }

      function setupCodec(video) {
        closeDecoder();
        if (typeof VideoDecoder !== "function" || typeof EncodedVideoChunk !== "function") {
          setReady(false);
          setStatus("WebCodecs unavailable", "error");
          return;
        }

        const h264 = video && video.h264;
        if (!h264) {
          setReady(false);
          setStatus("No H.264 stream", "error");
          return;
        }

        if (h264.codec) {
          codec = h264.codec;
        } else if (h264.profile_level_id) {
          codec = `avc1.${h264.profile_level_id}`;
        }
      }

      async function ensureDecoder(key) {
        if (!codec) return false;
        if (!decoder || decoder.state === "closed") {
          decoder = new VideoDecoder({
            output: renderVideoFrame,
            error: (error) => {
              setReady(false);
              setStatus(error.message, "error");
            }
          });
        }
        if (decoder.state !== "configured") {
          if (!key) return false;
          await decoder.configure({
            codec,
            optimizeForLatency: true,
            avc: { format: "annexb" }
          });
        }
        return decoder.state === "configured";
      }

      function findStartCode(data, from) {
        for (let offset = from; offset + 3 <= data.length; offset += 1) {
          if (offset + 4 <= data.length && data[offset] === 0 && data[offset + 1] === 0 && data[offset + 2] === 0 && data[offset + 3] === 1) {
            return { offset, length: 4 };
          }
          if (data[offset] === 0 && data[offset + 1] === 0 && data[offset + 2] === 1) {
            return { offset, length: 3 };
          }
        }
        return null;
      }

      function h264CodecFromAnnexB(data) {
        let start = findStartCode(data, 0);
        while (start) {
          const nalStart = start.offset + start.length;
          const next = findStartCode(data, nalStart);
          const nalEnd = next ? next.offset : data.length;
          if (nalEnd > nalStart && (data[nalStart] & 0x1f) === 7 && nalEnd - nalStart >= 4) {
            return `avc1.${[data[nalStart + 1], data[nalStart + 2], data[nalStart + 3]].map((value) => value.toString(16).padStart(2, "0")).join("").toUpperCase()}`;
          }
          start = next;
        }
        return "";
      }

      async function handleVideoPacket(buffer) {
        if (buffer.byteLength < 2) return;
        const header = new Uint8Array(buffer, 0, 2);
        if (header[0] !== 1) return;

        const key = header[1] !== 0;
        const payload = new Uint8Array(buffer, 2);
        if (key) {
          const detectedCodec = h264CodecFromAnnexB(payload);
          if (detectedCodec && detectedCodec !== codec) {
            closeDecoder();
            codec = detectedCodec;
          }
        }
        if (!(await ensureDecoder(key))) return;

        decoder.decode(new EncodedVideoChunk({
          timestamp: Math.trunc(performance.now() * 1000),
          type: key ? "key" : "delta",
          data: payload
        }));
      }

      function renderVideoFrame(frame) {
        if (pendingFrame) {
          closeFrame(pendingFrame);
        }
        pendingFrame = frame;
        if (!pendingDraw) {
          pendingDraw = true;
          window.requestAnimationFrame(drawPendingFrame);
        }
      }

      function drawPendingFrame() {
        pendingDraw = false;
        if (!pendingFrame) return;

        const frame = pendingFrame;
        pendingFrame = null;
        try {
          if (canvas.width !== frame.displayWidth || canvas.height !== frame.displayHeight) {
            canvas.width = frame.displayWidth;
            canvas.height = frame.displayHeight;
            ctx.imageSmoothingEnabled = false;
          }
          fitCanvas();
          ctx.drawImage(frame, 0, 0);
          emptyEl.hidden = true;
          recordFrameDrawn();
        } finally {
          closeFrame(frame);
        }
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        if (!canvas.width || !canvas.height || !rect.width || !rect.height) return null;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: Math.max(0, Math.min(canvas.width - 1, Math.round((event.clientX - rect.left) * scaleX))),
          y: Math.max(0, Math.min(canvas.height - 1, Math.round((event.clientY - rect.top) * scaleY)))
        };
      }

      function setDesktopSize(width, height) {
        setStatus(`${width}x${height}`, "connected");
      }

      function clampSize(value) {
        return Math.max(200, Math.min(32766, Math.floor(value)));
      }

      function selectedSize() {
        if (resolutionPreset.value === "auto") {
          return autoSize();
        }

        const match = resolutionPreset.value.match(/^(\d+)x(\d+)$/);
        if (match) {
          return {
            width: clampSize(Number.parseInt(match[1], 10)),
            height: clampSize(Number.parseInt(match[2], 10))
          };
        }

        return {
          width: defaultSize.width,
          height: defaultSize.height
        };
      }

      function autoSize() {
        const dpr = window.devicePixelRatio || 1;
        const cssWidth = stageEl.clientWidth || document.documentElement.clientWidth || window.innerWidth || defaultSize.width;
        const cssHeight = stageEl.clientHeight || document.documentElement.clientHeight || window.innerHeight || defaultSize.height;
        return {
          width: clampSize(cssWidth * dpr),
          height: clampSize(cssHeight * dpr)
        };
      }

      function requestDesktopResize(width, height) {
        const size = { width: clampSize(width), height: clampSize(height) };
        if (rdpReady) {
          send({ type: "resize", width: size.width, height: size.height });
        } else if (!socket) {
          connect();
        }
      }

      function applyAutoResize() {
        if (resolutionPreset.value !== "auto") return;
        const size = autoSize();
        requestDesktopResize(size.width, size.height);
      }

      function scheduleAutoResize(delay = 160) {
        window.clearTimeout(autoResizeTimer);
        autoResizeTimer = window.setTimeout(applyAutoResize, delay);
      }

      function refreshViewportSize(delay = 160) {
        fitCanvas();
        if (resolutionPreset.value === "auto") {
          scheduleAutoResize(delay);
        }
      }

      function applyResolutionPreset() {
        const value = resolutionPreset.value;
        syncSizeControlState();

        if (value === "auto") {
          scheduleAutoResize(0);
          return;
        }

        const match = value.match(/^(\d+)x(\d+)$/);
        if (match) {
          requestDesktopResize(Number.parseInt(match[1], 10), Number.parseInt(match[2], 10));
        }
      }

      function updateFullscreenToggle() {
        const active = Boolean(document.fullscreenElement);
        fullscreenToggle.disabled = !document.fullscreenEnabled;
        fullscreenToggle.setAttribute("aria-label", active ? "Exit fullscreen" : "Enter fullscreen");
        fullscreenToggle.title = active ? "Exit fullscreen" : "Fullscreen";
      }

      async function toggleFullscreen() {
        if (!document.fullscreenEnabled) return;

        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
          } else {
            await shellEl.requestFullscreen();
          }
        } catch (error) {
          setStatus(error && error.message ? error.message : "Fullscreen unavailable", "error");
        }
      }

      function fitCanvas() {
        if (!canvas.width || !canvas.height) return;
        const availableWidth = stageEl.clientWidth;
        const availableHeight = stageEl.clientHeight;
        if (!availableWidth || !availableHeight) return;

        const dpr = window.devicePixelRatio || 1;
        const scale = Math.min(
          availableWidth / canvas.width,
          availableHeight / canvas.height,
          1 / dpr
        );
        canvas.style.width = `${Math.max(1, Math.floor(canvas.width * scale))}px`;
        canvas.style.height = `${Math.max(1, Math.floor(canvas.height * scale))}px`;
      }

      function connect() {
        if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) return;

        window.clearTimeout(retryTimer);
        setReady(false);
        resetFps();
        setSizeControlsVisible(true);
        emptyEl.hidden = false;

        const wsUrl = new URL("/ws/rdp", window.location.href);
        wsUrl.protocol = wsUrl.protocol === "https:" ? "wss:" : "ws:";
        const { width, height } = selectedSize();
        if (Number.isFinite(width) && width >= 200) wsUrl.searchParams.set("width", String(width));
        if (Number.isFinite(height) && height >= 200) wsUrl.searchParams.set("height", String(height));
        socket = new WebSocket(wsUrl);
        socket.binaryType = "arraybuffer";
        setStatus("Connecting");

        socket.addEventListener("open", () => {
          canvas.focus();
        });

        socket.addEventListener("message", async (event) => {
          if (event.data instanceof ArrayBuffer) {
            handleVideoPacket(event.data).catch((error) => {
              setReady(false);
              setStatus(error.message, "error");
            });
            return;
          }

          const message = JSON.parse(event.data);
          if (message.type === "media") {
            setupCodec(message.video);
          } else if (message.type === "connected") {
            setReady(true);
            setStatus("Connected", "connected");
          } else if (message.type === "desktop_size") {
            setDesktopSize(message.width, message.height);
          } else if (message.type === "connecting") {
            setReady(false);
            setStatus("Connecting");
          } else if (message.type === "error") {
            setReady(false);
            setStatus(message.message, "error");
            setSizeControlsVisible(true);
          } else if (message.type === "disconnected") {
            setReady(false);
            setStatus(message.reason);
            setSizeControlsVisible(true);
          }
        });

        socket.addEventListener("close", () => {
          socket = null;
          closeDecoder();
          setReady(false);
          setStatus("Reconnecting");
          setSizeControlsVisible(true);
          retryTimer = window.setTimeout(connect, 1500);
        });

        socket.addEventListener("error", () => {
          setReady(false);
          setStatus("WebSocket error", "error");
          setSizeControlsVisible(true);
        });
      }

      canvas.addEventListener("contextmenu", (event) => event.preventDefault());
      canvas.addEventListener("pointermove", (event) => {
        if (!rdpReady) return;
        event.preventDefault();
        const point = canvasPoint(event);
        if (!point) return;
        send({ type: "pointer", action: "move", x: point.x, y: point.y });
      });
      canvas.addEventListener("pointerdown", (event) => {
        if (!rdpReady) return;
        event.preventDefault();
        if (canvas.setPointerCapture) canvas.setPointerCapture(event.pointerId);
        canvas.focus();
        const point = canvasPoint(event);
        if (!point) return;
        send({ type: "pointer", action: "down", x: point.x, y: point.y, button: event.button });
      });
      canvas.addEventListener("pointerup", (event) => {
        if (!rdpReady) return;
        event.preventDefault();
        if (canvas.releasePointerCapture && canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
        const point = canvasPoint(event);
        if (!point) return;
        send({ type: "pointer", action: "up", x: point.x, y: point.y, button: event.button });
      });
      canvas.addEventListener("wheel", (event) => {
        if (!rdpReady) return;
        event.preventDefault();
        const point = canvasPoint(event);
        if (!point) return;
        send({
          type: "pointer",
          action: "wheel",
          x: point.x,
          y: point.y,
          delta_y: Math.max(-255, Math.min(255, Math.trunc(-event.deltaY)))
        });
      }, { passive: false });
      canvas.addEventListener("keydown", (event) => {
        if (!rdpReady) return;
        event.preventDefault();
        send({ type: "key", down: true, code: event.code, key: event.key });
      });
      canvas.addEventListener("keyup", (event) => {
        if (!rdpReady) return;
        event.preventDefault();
        send({ type: "key", down: false, code: event.code, key: event.key });
      });
      window.addEventListener("resize", () => {
        refreshViewportSize();
      });
      window.setInterval(renderFps, 1000);
      resolutionPreset.addEventListener("change", applyResolutionPreset);
      fullscreenToggle.addEventListener("click", toggleFullscreen);
      document.addEventListener("fullscreenchange", () => {
        updateFullscreenToggle();
        refreshViewportSize(0);
      });
      document.addEventListener("fullscreenerror", () => {
        setStatus("Fullscreen unavailable", "error");
      });
      updateFullscreenToggle();

      fetch("/api/config")
        .then((response) => response.json())
        .then((config) => {
          defaultSize = {
            width: clampSize(config.default_width),
            height: clampSize(config.default_height)
          };
          setSizeControlsVisible(true);
          connect();
        })
        .catch(() => {
          setSizeControlsVisible(true);
          setStatus("Config unavailable", "error");
        });
    </script>
  </body>
</html>
